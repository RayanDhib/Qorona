{% extends "base.html" %}

{#- Link-preview (Open Graph / Twitter) card: one static image for the whole site. -#}
{% block extrahead %}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ config.site_name if page.is_homepage else page.title | default(config.site_name, true) }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/social-card.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="628">
  <meta name="twitter:card" content="summary_large_image">
{% endblock %}
