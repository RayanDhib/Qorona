name: Docs

on:
  push:
    branches: [main]
    paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs.yml"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # mkdocs never imports the package; install the site tooling only.
      - name: Install docs tooling
        run: pip install "mkdocs-material>=9,<10"

      - name: Build (strict)
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: site

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
